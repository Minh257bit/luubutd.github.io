<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lưu Bút Thùy Dương - Kỷ Niệm Yêu Thương</title>
    <!-- Google Fonts: Playfair Display cho tiêu đề, Lato cho nội dung -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Bảng màu và kiểu cơ bản */
        :root {
            --primary-color: #ad1457;
            --secondary-color: #f8bbd0;
            --accent-color: #e1bee7;
            --background-gradient: linear-gradient(135deg, #fff3e0 0%, #fce4ec 50%, #f8bbd0 100%);
            --text-color: #333;
            --author-color: #ad1457;
            --container-bg: rgba(255, 255, 255, 0.6); /* Cho Glassmorphism */
            --transition-speed: 0.3s;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--background-gradient);
            text-align: center;
            padding: 40px 20px;
            color: var(--text-color);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tiêu đề chính */
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(244, 143, 177, 0.6);
            margin-bottom: 5px;
            font-size: 2.8em;
        }

        p {
            margin-top: 0;
            margin-bottom: 30px;
            color: #777;
        }

        /* Container cho Form Input */
        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(173, 20, 87, 0.1);
            max-width: 600px;
            width: 100%;
            margin-bottom: 40px;
        }

        /* Input và Textarea */
        input[type="text"],
        input[type="password"],
        textarea {
            width: calc(100% - 24px); /* Trừ padding */
            margin: 12px 0;
            font-size: 1.1em;
            padding: 12px;
            border: 2px solid var(--secondary-color);
            border-radius: 12px;
            outline: none;
            transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
            background-color: #fff;
        }

            input:focus, textarea:focus {
                border-color: var(--primary-color);
                box-shadow: 0 0 10px rgba(240, 98, 146, 0.4);
            }

        textarea {
            height: 120px;
            resize: vertical;
        }

        /* Nút bấm chung */
        button {
            padding: 12px 24px;
            background: linear-gradient(45deg, var(--primary-color), #ec407a);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            margin: 8px;
            border-radius: 12px;
            transition: background var(--transition-speed), transform var(--transition-speed), box-shadow var(--transition-speed);
            box-shadow: 0 4px 10px rgba(173, 20, 87, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

            button:hover {
                background: linear-gradient(45deg, #880e4f, var(--primary-color));
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(173, 20, 87, 0.5);
            }

        /* Container cho Kỷ Niệm (Glassmorphism) */
        #messages {
            margin-top: 0;
            text-align: left;
            max-width: 800px;
            width: 100%;
            background: var(--container-bg);
            backdrop-filter: blur(10px); /* Hiệu ứng mờ nền */
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 0.8s ease-out; /* Hoạt ảnh fade-in khi trang tải */
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            margin-top: 0;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* Mỗi tin nhắn kỷ niệm */
        .msg {
            border: 1px solid rgba(224, 224, 224, 0.5);
            background: rgba(255, 255, 255, 0.4);
            padding: 15px;
            margin: 15px 0;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            position: relative;
        }

            .msg:hover {
                transform: translateY(-3px) scale(1.01);
                box-shadow: 0 8px 20px rgba(173, 20, 87, 0.15);
                background: rgba(252, 228, 236, 0.6);
            }

        /* Icon Tác giả */
        .msg-author-icon {
            font-size: 1.5em;
            margin-right: 10px;
            color: var(--author-color);
            opacity: 0.8;
        }

        .msg-content {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .author {
            font-weight: bold;
            color: var(--author-color);
            font-size: 1.1em;
            margin-right: 10px;
        }

        .text {
            flex: 1;
            color: #555;
            font-style: italic;
        }

        .msg-buttons {
            display: flex;
            gap: 8px;
        }

        /* Hoạt ảnh fadeIn */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Media query cho thiết bị di động */
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .form-container, #messages {
                padding: 20px;
            }

            .msg {
                flex-direction: column;
                align-items: flex-start;
            }

            .msg-content {
                width: 100%;
                margin-bottom: 10px;
            }

            .msg-buttons {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <h1>📖 Lưu Bút Thùy Dương</h1>

    <!-- Phần nhập kỷ niệm mới -->
    <div class="form-container">
        <input id="author" type="text" placeholder="👤 Tên của bạn"><br>
        <input id="password" type="password" placeholder="🔑 Mật khẩu bí mật"><br>
        <textarea id="note" placeholder="💬 Nhập kỷ niệm..."></textarea><br>
        <button onclick="addMessage()">✨ Thêm Kỷ Niệm</button>
    </div>

    <!-- Phần hiển thị danh sách kỷ niệm -->
    <div id="messages">
        <h2>💖 Kỷ niệm đã lưu:</h2>
    </div>

    <script>
        window.onload = function () {
            const saved = JSON.parse(localStorage.getItem("luubut_thuyduong")) || [];
            saved.forEach((entry, index) => showMessage(entry.author, index));
        };

        // Hàm escapeHTML từ yêu cầu trước
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag]));
        }

        function addMessage() {
            const author = document.getElementById('author').value.trim();
            const note = document.getElementById('note').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (author && note && pass) {
                const saved = JSON.parse(localStorage.getItem("luubut_thuyduong")) || [];
                saved.push({ author, text: note, password: pass });
                localStorage.setItem("luubut_thuyduong", JSON.stringify(saved));
                showMessage(author, saved.length - 1);
                document.getElementById('note').value = "";
                document.getElementById('password').value = ""; // Xóa mật khẩu sau khi lưu
            } else {
                alert("Vui lòng nhập tên, mật khẩu và kỷ niệm!");
            }
        }

        function showMessage(author, index) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = "msg";

            // Sử dụng icon và tên thân thiện
            div.innerHTML = `
                <div class="msg-content">
                    <span class="msg-author-icon">👤</span>
                    <span class="author">${escapeHTML(author)}:</span>
                    <span id="msg${index}" class="text">[Bí mật]</span>
                </div>
                <div class="msg-buttons">
                    <button onclick="reveal(${index})">👁️</button>
                    <button onclick="deleteMessage(${index})">🗑️</button>
                </div>
              `;
            container.appendChild(div);
        }

        function reveal(index) {
            const msgElement = document.getElementById("msg" + index);

            // Fix lỗi UX: Bấm lần nữa để ẩn kỷ niệm đi
            if (msgElement.textContent !== "[Bí mật]") {
                msgElement.textContent = "[Bí mật]";
                return;
            }

            const pass = prompt("Nhập mật khẩu để xem:");
            const saved = JSON.parse(localStorage.getItem("luubut_thuyduong")) || [];
            if (saved[index].password === pass) {
                msgElement.textContent = saved[index].text;
            } else {
                alert("Sai mật khẩu!");
            }
        }

        function deleteMessage(index) {
            const pass = prompt("Nhập mật khẩu để xóa:");
            let saved = JSON.parse(localStorage.getItem("luubut_thuyduong")) || [];
            if (saved[index].password === pass) {
                saved.splice(index, 1);
                localStorage.setItem("luubut_thuyduong", JSON.stringify(saved));
                document.getElementById('messages').innerHTML = "<h2>💖 Kỷ niệm đã lưu:</h2>";
                saved.forEach((entry, i) => showMessage(entry.author, i));
            } else {
                alert("Sai mật khẩu!");
            }
        }
    </script>
</body>
</html>
